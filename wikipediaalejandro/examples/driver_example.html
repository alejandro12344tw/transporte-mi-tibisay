<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chofer - Aceptar Carga (Ejemplo)</title>
</head>
<body>
  <h2>Chofer - Aceptar Carga (Ejemplo)</h2>
  <div>
    <label>Email (chofer): <input id="email" value="driver@tibisay.local"></label><br>
    <label>Password: <input id="password" type="password" value="driverpass"></label><br>
  </div>

  <div>
    <button id="listBtn">Listar Cargas Disponibles</button>
    <div id="loads"></div>
  </div>

  <pre id="log"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wwawpuehlgyyciongipv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3YXdwdWVobGd5eWNpb25naXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1ODkxNTEsImV4cCI6MjA5NjE2NTE1MX0.tYhixlZambJLjQmZd38fVuv_j0H0UVVm8rHoG4DCIOk';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const log = (msg) => {
      const p = document.getElementById('log');
      p.textContent += msg + '\n';
      console.log(msg);
    };

    async function signIn(email, password) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        log('Error signIn: ' + error.message);
        return null;
      }
      log('Autenticado: ' + JSON.stringify(data.user?.id));
      return data.user;
    }

    async function listLoads() {
      const { data, error } = await supabase.from('loads').select('id,origin,destination,pay,truckType,assignedTo');
      if (error) {
        log('Error listar: ' + error.message);
        return;
      }
      const container = document.getElementById('loads');
      container.innerHTML = '';
      data.forEach(l => {
        const div = document.createElement('div');
        div.innerHTML = `#${l.id} - ${l.origin} ➜ ${l.destination} • ${l.pay} • ${l.truckType} • asignado: ${l.assignedTo || 'Nadie'} <button data-id="${l.id}">Aceptar</button>`;
        container.appendChild(div);
        div.querySelector('button').addEventListener('click', async (e) => {
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          const user = await signIn(email, password);
          if (!user) return;

          const id = parseInt(e.currentTarget.getAttribute('data-id'));
          const username = (await getMyUsername()) || '';

          const { data: up, error: upErr } = await supabase
            .from('loads')
            .update({ assignedTo: username })
            .eq('id', id);

          if (upErr) {
            log('Error al aceptar carga: ' + upErr.message);
          } else {
            log('Carga aceptada: ' + JSON.stringify(up));
            listLoads();
          }
        });
      });
    }

    async function getMyUsername() {
      // Intentamos buscar username en la tabla users relacionada a auth.uid()
      const { data, error } = await supabase.from('users').select('username').eq('auth_id', supabase.auth.getUser()?.data?.user?.id).limit(1);
      if (error) {
        log('Error obtener username: ' + error.message);
        return null;
      }
      if (!data || data.length === 0) return null;
      return data[0].username;
    }

    document.getElementById('listBtn').addEventListener('click', async () => {
      await listLoads();
    });
  </script>
</body>
</html>
